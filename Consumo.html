<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Energética CTW-MI82 JM: Consumo</title>
</head>
<body>

    <script src="calcConsumo.js"></script>

    <input type="text" id="nome" placeholder="Nome" oninput="principal()">
    <input type="number" id="potencia" placeholder="Potência" style="text-align: right;" oninput="principal()">
    <select name="unidade" id="uni" oninput="principal()">
        <option value=""> - </option>
        <option value="W">W</option>
        <option value="kW">kW</option>
    </select>
    <input type="number" id="tempo" placeholder="Horas usadas" oninput="principal()">
    <input type="number" id="valor" placeholder="Preço por hora" oninput="principal()">
    <p id="resultado">Gasto: </p>
    <p id="preco">Preço: </p>

    <a href="index.html">
        <button>Voltar</button>
    </a>
    
</body>
</html>
